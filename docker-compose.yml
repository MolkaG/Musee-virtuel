version: '3.8'

services:
  app:
    build:
      context: ./gestion-signalement-main
      dockerfile: Dockerfile
    image: musee-virtuel:local
    container_name: musee-virtuel-app
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
