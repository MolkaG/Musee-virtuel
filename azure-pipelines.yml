# ═══════════════════════════════════════════════════════════════════════════════
# Pipeline CI/CD — Musée Virtuel (gestion-signalement)
# Stages : Build → DockerBuild → DeployDev → DeployProd
# ═══════════════════════════════════════════════════════════════════════════════

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - 'docs/**'
      - 'README.md'
      - 'terraform/**'

pr:
  branches:
    include:
      - main
      - develop

variables:
  # ── Groupe de variables défini dans Azure DevOps Library ──────────────────────
  # Ajouter dans "musee-virtuel-variables" :
  #   ACR_LOGIN_SERVER   = museevirtuelacr.azurecr.io  (si ACR disponible)
  #   APP_NAME_DEV       = app-musee-virtuel-dev
  #   APP_NAME_PROD      = app-musee-virtuel-prod
  #   RESOURCE_GROUP     = rg-museevirtuel-dev
  #   SONAR_ORG          = molkag
  #   SONAR_PROJECT_KEY  = musee-virtuel
  #   SONAR_TOKEN        = <secret>
  #   DOCKER_HUB_USERNAME = <votre-username-dockerhub>
  - group: musee-virtuel-variables

  - name: imageRepository
    value: 'musee-virtuel'
  - name: dockerfilePath
    value: 'gestion-signalement-main/Dockerfile'
  - name: buildContext
    value: 'gestion-signalement-main'
  - name: mavenPomFile
    value: 'gestion-signalement-main/pom.xml'
  - name: MAVEN_CACHE_FOLDER
    value: $(Pipeline.Workspace)/.m2/repository
  - name: tag
    value: '$(Build.BuildId)'

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 1 — Build, Tests JUnit, Analyse SonarCloud
# ═══════════════════════════════════════════════════════════════════════════════
stages:
  - stage: Build
    displayName: 'Build · Tests · SonarCloud'
    jobs:
      - job: BuildAndTest
        displayName: 'Maven 3 · Java 17 · Sonar'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Cache@2
            displayName: 'Cache dépendances Maven'
            inputs:
              key: 'maven | "$(Agent.OS)" | $(mavenPomFile)'
              restoreKeys: 'maven | "$(Agent.OS)"'
              path: $(MAVEN_CACHE_FOLDER)

          - task: Maven@3
            displayName: 'mvn clean verify + SonarCloud (Java 17)'
            inputs:
              mavenPomFile: '$(mavenPomFile)'
              goals: 'clean verify sonar:sonar'
              options: >
                -Dmaven.repo.local=$(MAVEN_CACHE_FOLDER)
                -Dmaven.test.failure.ignore=true
                -Dsonar.projectKey=$(SONAR_PROJECT_KEY)
                -Dsonar.organization=$(SONAR_ORG)
                -Dsonar.host.url=https://sonarcloud.io
                -Dsonar.token=$(SONAR_TOKEN)
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.17'

          - task: PublishBuildArtifacts@1
            displayName: 'Publier JAR artifact'
            inputs:
              PathtoPublish: '$(buildContext)/target/gestion-signalement.jar'
              ArtifactName: 'app-jar'
              publishLocation: 'Container'

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 2 — Docker Build + Push vers Docker Hub
# Prérequis : service connection "DockerHub-Service-Connection"
#   → Project Settings → Service connections → Docker Registry → Docker Hub
#   (ne nécessite PAS de droits Entra ID)
# ═══════════════════════════════════════════════════════════════════════════════
  - stage: DockerBuild
    displayName: 'Docker Build · Push Docker Hub'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: BuildAndPushImage
        displayName: 'docker build + push → Docker Hub'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            displayName: 'Build image Docker (multi-stage)'
            inputs:
              containerRegistry: 'DockerHub-Service-Connection'
              repository: '$(DOCKER_HUB_USERNAME)/$(imageRepository)'
              command: 'build'
              dockerfile: '$(dockerfilePath)'
              buildContext: '$(buildContext)'
              tags: |
                $(tag)
                latest

          - task: Docker@2
            displayName: 'Push image vers Docker Hub'
            inputs:
              containerRegistry: 'DockerHub-Service-Connection'
              repository: '$(DOCKER_HUB_USERNAME)/$(imageRepository)'
              command: 'push'
              tags: |
                $(tag)
                latest

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 3 — Déploiement automatique sur Azure Container Instances (centralindia)
# Raison : Azure-Service-Connection bloqué (droits Entra ID insuffisants).
# Solution : az login avec credentials stockés comme secrets dans la Library.
# Prérequis dans musee-virtuel-variables :
#   AZURE_USERNAME    = Molka.GMAR@esprit.tn  (secret)
#   AZURE_PASSWORD    = ***                    (secret)
#   AZURE_SUBSCRIPTION = fc48fe67-aac8-4479-b90a-85e9b1aca6f7
# ═══════════════════════════════════════════════════════════════════════════════
  - stage: DeployACI
    displayName: 'Deploy → Azure Container Instances (centralindia)'
    dependsOn: DockerBuild
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployACI
        displayName: 'Deploy container → ACI centralindia'
        environment: 'dev'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: Bash@3
                  displayName: 'az login + deploy ACI'
                  inputs:
                    targetType: 'inline'
                    script: |
                      az login -u "$(AZURE_USERNAME)" -p "$(AZURE_PASSWORD)" --output none
                      az account set --subscription "$(AZURE_SUBSCRIPTION)"

                      az container delete \
                        --resource-group rg-musee-allowed \
                        --name musee-backend \
                        --yes 2>/dev/null || true

                      az container create \
                        --resource-group rg-musee-allowed \
                        --name musee-backend \
                        --image $(DOCKER_HUB_USERNAME)/$(imageRepository):$(tag) \
                        --dns-name-label musee-$(Build.BuildId) \
                        --ports 8080 \
                        --cpu 1 --memory 1.5 \
                        --os-type Linux \
                        --restart-policy Always \
                        --location centralindia \
                        --environment-variables \
                          SPRING_PROFILES_ACTIVE=prod \
                          SPRING_DATASOURCE_URL="jdbc:mysql://musee-db-molka.mysql.database.azure.com:3306/gestion_signalement?useSSL=true&requireSSL=false&serverTimezone=UTC" \
                          SPRING_DATASOURCE_USERNAME="adminmusee" \
                          SPRING_DATASOURCE_PASSWORD="$(AZURE_PASSWORD)"

                      echo "✅ Déployé sur : http://musee-$(Build.BuildId).centralindia.azurecontainer.io:8080"
