# ═══════════════════════════════════════════════════════════════════════════════
# Pipeline CI/CD — Musée Virtuel (WebSocketsChat)
# Stages : Build → DockerBuild → DeployDev → DeployProd
# ═══════════════════════════════════════════════════════════════════════════════

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - 'docs/**'
      - 'README.md'
      - 'terraform/**'

pr:
  branches:
    include:
      - main
      - develop

variables:
  # ── Groupe de variables défini dans Azure DevOps Library ──────────────────────
  # Créer un groupe "musee-virtuel-variables" avec :
  #   ACR_LOGIN_SERVER   = museevirtuelacr.azurecr.io
  #   APP_NAME_DEV       = app-musee-virtuel-dev
  #   APP_NAME_PROD      = app-musee-virtuel-prod
  #   RESOURCE_GROUP     = rg-musee-virtuel-prod
  #   SONAR_ORG          = <votre-org-sonarcloud>
  #   SONAR_PROJECT_KEY  = musee-virtuel
  - group: musee-virtuel-variables

  # ── Variables statiques ───────────────────────────────────────────────────────
  - name: imageRepository
    value: 'musee-virtuel'
  - name: dockerfilePath
    value: 'gestion-signalement-main/Dockerfile'
  - name: buildContext
    value: 'gestion-signalement-main'
  - name: mavenPomFile
    value: 'gestion-signalement-main/pom.xml'
  - name: MAVEN_CACHE_FOLDER
    value: $(Pipeline.Workspace)/.m2/repository
  - name: tag
    value: '$(Build.BuildId)'

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 1 — Build, Tests JUnit, Analyse SonarCloud
# ═══════════════════════════════════════════════════════════════════════════════
stages:
  - stage: Build
    displayName: 'Build · Tests · SonarCloud'
    jobs:
      - job: BuildAndTest
        displayName: 'Maven 3 · Java 17 · Sonar'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          # Cache Maven pour accélérer les builds suivants
          - task: Cache@2
            displayName: 'Cache dépendances Maven'
            inputs:
              key: 'maven | "$(Agent.OS)" | $(mavenPomFile)'
              restoreKeys: 'maven | "$(Agent.OS)"'
              path: $(MAVEN_CACHE_FOLDER)

          # Build Maven + tests JUnit + analyse SonarCloud (via plugin Maven natif)
          - task: Maven@3
            displayName: 'mvn clean verify + SonarCloud (Java 17)'
            inputs:
              mavenPomFile: '$(mavenPomFile)'
              goals: 'clean verify sonar:sonar'
              options: >
                -Dmaven.repo.local=$(MAVEN_CACHE_FOLDER)
                -Dmaven.test.failure.ignore=true
                -Dsonar.projectKey=$(SONAR_PROJECT_KEY)
                -Dsonar.organization=$(SONAR_ORG)
                -Dsonar.host.url=https://sonarcloud.io
                -Dsonar.token=$(SONAR_TOKEN)
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.17'

          # Publier le JAR comme artifact de pipeline
          - task: PublishBuildArtifacts@1
            displayName: 'Publier JAR artifact'
            inputs:
              PathtoPublish: '$(buildContext)/target/gestion-signalement-0.0.1-SNAPSHOT.jar'
              ArtifactName: 'app-jar'
              publishLocation: 'Container'

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 2 — Docker Build + Push ACR
# En attente : service connection ACR-Service-Connection (droits admin requis)
# ═══════════════════════════════════════════════════════════════════════════════
  - stage: DockerBuild
    displayName: 'Docker Build · Push ACR'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: BuildAndPushImage
        displayName: 'docker build + push → ACR'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              echo "Stage DockerBuild défini — nécessite ACR-Service-Connection"
              echo "Architecture : docker build → push vers Azure Container Registry"
            displayName: 'Info: CD en attente service connections'

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 3 — Déploiement automatique sur DEV
# En attente : service connection Azure-Service-Connection (droits admin requis)
# ═══════════════════════════════════════════════════════════════════════════════
  - stage: DeployDev
    displayName: 'Deploy → DEV (auto)'
    dependsOn: DockerBuild
    condition: succeeded()
    jobs:
      - job: DeployDevInfo
        displayName: 'Deploy DEV info'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              echo "Stage DeployDev défini — nécessite Azure-Service-Connection"
              echo "Architecture : App Service DEV — container depuis ACR"
            displayName: 'Info: Deploy DEV en attente service connections'

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 4 — Déploiement PROD avec approbation manuelle + Blue/Green
# En attente : service connection Azure-Service-Connection (droits admin requis)
# ═══════════════════════════════════════════════════════════════════════════════
  - stage: DeployProd
    displayName: 'Deploy → PROD (approbation + Blue/Green)'
    dependsOn: DockerBuild
    condition: succeeded()
    jobs:
      - job: DeployProdInfo
        displayName: 'Deploy PROD info'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              echo "Stage DeployProd défini — nécessite Azure-Service-Connection"
              echo "Architecture : slot staging → swap Blue/Green vers production"
            displayName: 'Info: Deploy PROD en attente service connections'
