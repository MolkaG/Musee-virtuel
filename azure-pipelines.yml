# ═══════════════════════════════════════════════════════════════════════════════
# Pipeline CI/CD — Musée Virtuel (gestion-signalement)
# Stages : Build → DockerBuild → DeployDev → DeployProd
# ═══════════════════════════════════════════════════════════════════════════════

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - 'docs/**'
      - 'README.md'
      - 'terraform/**'

pr:
  branches:
    include:
      - main
      - develop

variables:
  # ── Groupe de variables défini dans Azure DevOps Library ──────────────────────
  # Ajouter dans "musee-virtuel-variables" :
  #   ACR_LOGIN_SERVER   = museevirtuelacr.azurecr.io  (si ACR disponible)
  #   APP_NAME_DEV       = app-musee-virtuel-dev
  #   APP_NAME_PROD      = app-musee-virtuel-prod
  #   RESOURCE_GROUP     = rg-museevirtuel-dev
  #   SONAR_ORG          = molkag
  #   SONAR_PROJECT_KEY  = musee-virtuel
  #   SONAR_TOKEN        = <secret>
  #   DOCKER_HUB_USERNAME = <votre-username-dockerhub>
  - group: musee-virtuel-variables

  - name: imageRepository
    value: 'musee-virtuel'
  - name: dockerfilePath
    value: 'gestion-signalement-main/Dockerfile'
  - name: buildContext
    value: 'gestion-signalement-main'
  - name: mavenPomFile
    value: 'gestion-signalement-main/pom.xml'
  - name: MAVEN_CACHE_FOLDER
    value: $(Pipeline.Workspace)/.m2/repository
  - name: tag
    value: '$(Build.BuildId)'

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 1 — Build, Tests JUnit, Analyse SonarCloud
# ═══════════════════════════════════════════════════════════════════════════════
stages:
  - stage: Build
    displayName: 'Build · Tests · SonarCloud'
    jobs:
      - job: BuildAndTest
        displayName: 'Maven 3 · Java 17 · Sonar'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Cache@2
            displayName: 'Cache dépendances Maven'
            inputs:
              key: 'maven | "$(Agent.OS)" | $(mavenPomFile)'
              restoreKeys: 'maven | "$(Agent.OS)"'
              path: $(MAVEN_CACHE_FOLDER)

          - task: Maven@3
            displayName: 'mvn clean verify + SonarCloud (Java 17)'
            inputs:
              mavenPomFile: '$(mavenPomFile)'
              goals: 'clean verify sonar:sonar'
              options: >
                -Dmaven.repo.local=$(MAVEN_CACHE_FOLDER)
                -Dmaven.test.failure.ignore=true
                -Dsonar.projectKey=$(SONAR_PROJECT_KEY)
                -Dsonar.organization=$(SONAR_ORG)
                -Dsonar.host.url=https://sonarcloud.io
                -Dsonar.token=$(SONAR_TOKEN)
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.17'

          - task: PublishBuildArtifacts@1
            displayName: 'Publier JAR artifact'
            inputs:
              PathtoPublish: '$(buildContext)/target/gestion-signalement.jar'
              ArtifactName: 'app-jar'
              publishLocation: 'Container'

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 2 — Docker Build + Push vers Docker Hub
# Prérequis : service connection "DockerHub-Service-Connection"
#   → Project Settings → Service connections → Docker Registry → Docker Hub
#   (ne nécessite PAS de droits Entra ID)
# ═══════════════════════════════════════════════════════════════════════════════
  - stage: DockerBuild
    displayName: 'Docker Build · Push Docker Hub'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: BuildAndPushImage
        displayName: 'docker build + push → Docker Hub'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            displayName: 'Build image Docker (multi-stage)'
            inputs:
              containerRegistry: 'DockerHub-Service-Connection'
              repository: '$(DOCKER_HUB_USERNAME)/$(imageRepository)'
              command: 'build'
              dockerfile: '$(dockerfilePath)'
              buildContext: '$(buildContext)'
              tags: |
                $(tag)
                latest

          - task: Docker@2
            displayName: 'Push image vers Docker Hub'
            inputs:
              containerRegistry: 'DockerHub-Service-Connection'
              repository: '$(DOCKER_HUB_USERNAME)/$(imageRepository)'
              command: 'push'
              tags: |
                $(tag)
                latest

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 3 — Déploiement automatique sur DEV (main branch uniquement)
# Prérequis : service connection "Azure-Service-Connection"
# ═══════════════════════════════════════════════════════════════════════════════
  - stage: DeployDev
    displayName: 'Deploy → DEV (auto)'
    dependsOn: DockerBuild
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployDev
        displayName: 'Deploy container → App Service DEV'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: AzureWebAppContainer@1
            displayName: 'Déployer image sur App Service DEV'
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appName: '$(APP_NAME_DEV)'
              containers: 'docker.io/$(DOCKER_HUB_USERNAME)/$(imageRepository):$(tag)'

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 4 — Déploiement PROD avec approbation manuelle + Blue/Green
# Slot staging → swap vers production (zero-downtime)
# Prérequis : service connection "Azure-Service-Connection"
#           + environnement "production" avec approbation dans Azure DevOps
# ═══════════════════════════════════════════════════════════════════════════════
  - stage: DeployProd
    displayName: 'Deploy → PROD (approbation + Blue/Green)'
    dependsOn: DeployDev
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProd
        displayName: 'Deploy → slot staging + swap production'
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Déployer image → slot staging'
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    appName: '$(APP_NAME_PROD)'
                    deployToSlotOrASE: true
                    resourceGroupName: '$(RESOURCE_GROUP)'
                    slotName: 'staging'
                    containers: 'docker.io/$(DOCKER_HUB_USERNAME)/$(imageRepository):$(tag)'

                - task: AzureAppServiceManage@0
                  displayName: 'Swap staging → production (Blue/Green)'
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    Action: 'Swap Slots'
                    WebAppName: '$(APP_NAME_PROD)'
                    ResourceGroupName: '$(RESOURCE_GROUP)'
                    SourceSlot: 'staging'
